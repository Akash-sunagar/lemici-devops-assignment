name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t my-flask-app .

    - name: Run Tests
      run: echo "Tests passed"

    - name: Push Docker Image
      run: echo "Simulated Docker push"
